; FrontAccounting recommended PHP settings
session.auto_start = 0
date.timezone = UTC

; Security settings recommended in README.md
register_globals = Off
magic_quotes_gpc = Off

; Development settings
display_errors = On
display_startup_errors = On
log_errors = On
error_log = /proc/self/fd/2
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Increase limits for potentially large reports or uploads
memory_limit = 256M
post_max_size = 20M
upload_max_filesize = 20M
max_execution_time = 60
